<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Genomic Imprinting Model</title>
    <link rel="stylesheet" href="style.css">

    <!-- MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<div class="container">
    <h1>Genomic Expression Model</h1>

    <!-- FORMULA -->
    <div class="formula">
        \[
        \frac{dG}{dt} = rG\left(1 - \frac{G}{K}\right) - sG
        \]
    </div>

<div class="controls">

    <label>r (growth rate): <span id="r_val">0.8</span></label>
    <input type="range" id="r" min="0" max="2" step="0.01" value="0.8">

    <label>K (carrying capacity): <span id="K_val">50</span></label>
    <input type="range" id="K" min="1" max="100" step="1" value="50">

    <label>s (stress factor): <span id="s_val">0.3</span></label>
    <input type="range" id="s" min="0" max="2" step="0.01" value="0.3">

    <button onclick="simulate()">Run Simulation</button>

</div>

    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
